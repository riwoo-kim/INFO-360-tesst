<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; background-color: #f0f0f0; }
        .iphone-container { width: 375px; height: 812px; background-color: white; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); position: relative; overflow-y: auto; padding: 50px 20px 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* Chart Section */
        .chart-box { background: #eee; border-radius: 20px; height: 250px; position: relative; padding: 20px; display: flex; align-items: flex-end; justify-content: space-around; margin-bottom: 15px; }
        .y-axis-label { position: absolute; left: 10px; top: 50%; transform: rotate(-90deg); font-weight: bold; font-size: 14px; }
        .bar { width: 30px; background: black; border-radius: 5px 5px 0 0; position: relative; }
        .bar-label { position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%) rotate(45deg); font-size: 10px; white-space: nowrap; width: 80px; }

        .btn-add-manual { background: black; color: white; border: none; padding: 8px 15px; border-radius: 15px; float: right; cursor: pointer; font-size: 12px; margin-bottom: 20px; }

        /* Nutrition Summary Card */
        .summary-card { background: black; color: white; border-radius: 20px; padding: 20px; clear: both; }
        .nutrient-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nutrient-val { background: white; color: black; border-radius: 15px; padding: 5px 15px; min-width: 80px; text-align: center; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="iphone-container">
        <header class="header">
            <span style="cursor:pointer;">&lt;</span>
            <h1 style="font-size: 18px; margin:0;">Nutrition Tracker</h1>
            <span style="cursor:pointer;">☰</span>
        </header>

        <div class="chart-box">
            <div class="y-axis-label">%DV</div>
            <div class="bar" style="height: 150px;"><span class="bar-label">Calories</span></div>
            <div class="bar" style="height: 150px;"><span class="bar-label">Carbohydrates</span></div>
            <div class="bar" style="height: 160px;"><span class="bar-label">Protein</span></div>
            <div class="bar" style="height: 150px;"><span class="bar-label">Fat</span></div>
            <div class="bar" style="height: 150px;"><span class="bar-label">Fiber</span></div>
        </div>

        <button class="btn-add-manual" onclick="location.href='manual.html'">Add Manually</button>

        <div class="summary-card">
            <div class="nutrient-row"><span>Calories</span> <div class="nutrient-val">1500 kcal</div></div>
            <div class="nutrient-row"><span>Carbohydrates</span> <div class="nutrient-val">70g</div></div>
            <div class="nutrient-row"><span>Protein</span> <div class="nutrient-val">50g</div></div>
            <div class="nutrient-row"><span>Fat</span> <div class="nutrient-val">20g</div></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
