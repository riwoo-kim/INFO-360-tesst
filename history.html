<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Story</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; background-color: #f0f0f0; }
        .iphone-container { width: 375px; height: 812px; background-color: white; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); position: relative; overflow-y: auto; padding: 50px 20px 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .level-badge { background: black; color: white; border-radius: 15px; padding: 10px 15px; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; width: 100%; box-sizing: border-box;}
        .level-tag { background: white; color: black; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }

        .history-content { background: #eee; border-radius: 20px; padding: 20px; line-height: 1.5; font-size: 13px; color: #333; }
    </style>
</head>
<body>
    <div class="iphone-container">
        <header class="header">
            <span class="back-btn" style="cursor:pointer;" onclick="location.href='recipe.html'">&lt;</span>
            <h1 style="font-size: 20px; margin:0;">History story~</h1>
            <span class="menu-btn">☰</span>
        </header>

        <div class="level-badge">
            <span>For</span>
            <span class="level-tag">Tomato soup</span>
        </div>

        <p style="font-weight: bold;">Do you know..?</p>
        <div class="history-content">
            The first published recipe for tomato soup appeared in N. K. M. Lee's The Cook's Own Book in 1832...
            <br><br>
            Depending on the recipe, tomato soup is generally low in calories and high in potassium and vitamins C, K, and A...
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
