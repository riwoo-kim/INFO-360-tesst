<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page - Kitchen App</title>
    <style>
        /* Base styles to mimic mobile app */
        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .iphone-container {
            width: 375px;
            height: 812px;
            background-color: white;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden; /* Clips the side menu when closed */
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px 10px;
            position: relative;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
        }

        .menu-btn {
            position: absolute;
            right: 25px;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
        }

        /* Main Content */
        .content {
            padding: 20px;
            flex-grow: 1;
        }

        .greeting {
            font-size: 36px;
            font-weight: bold;
            margin: 20px 0 40px;
        }

        /* Black Cards from design */
        .card {
            background-color: black;
            color: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-size: 16px;
            margin: 0;
        }

        .card-input-box {
            background-color: white;
            height: 35px;
            border-radius: 10px;
            width: 100%;
        }

        /* Slide Menu Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none; /* Hidden by default */
            z-index: 50;
        }

        /* Side Menu Drawer */
        .side-menu {
            position: absolute;
            top: 40px; /* Slight margin from top bezel */
            right: -280px; /* Hidden position */
            width: 250px;
            height: 730px; /* Fits inside the phone frame */
            background-color: #e5e5e5;
            border-radius: 20px 0 0 20px;
            transition: right 0.3s ease-in-out;
            z-index: 101;
            padding: 20px;
            box-sizing: border-box;
        }

        .side-menu.open {
            right: 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 10px;
            font-size: 18px;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .icon {
            margin-right: 15px;
            font-size: 22px;
        }

    </style>
</head>
<body>

    <div class="iphone-container">
        <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

        <nav class="side-menu" id="sideMenu">
            <div class="menu-btn" onclick="toggleMenu()" style="top: 20px; right: 20px;">☰</div>
            <div style="margin-top: 60px;">
                <a href="#" class="menu-item"><span class="icon">👤</span> Profile</a>
                <a href="#" class="menu-item"><span class="icon">😊</span> Nutrition</a>
                <a href="#" class="menu-item"><span class="icon">✔</span> Recommendation</a>
            </div>
        </nav>

        <header class="header">
            <h1>Main</h1>
            <div class="menu-btn" onclick="toggleMenu()">☰</div>
        </header>

        <main class="content">
            <div class="greeting">Hi [NAME]!</div>

            <div class="card">
                <p class="card-title">What did you eat today?</p>
                <div class="card-input-box"></div>
            </div>

            <div class="card">
                <p class="card-title">How about this menu?</p>
                <div class="card-input-box"></div>
            </div>

            <div class="card">
                <p class="card-title">You need more ...</p>
                <div class="card-input-box"></div>
            </div>
        </main>
    </div>

    <script>
        // Function to open and close the side menu
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('overlay');
            
            // Toggle classes to animate
            menu.classList.toggle('open');
            
            // Show/hide overlay
            if (menu.classList.contains('open')) {
                overlay.style.display = 'block';
            } else {
                overlay.style.display = 'none';
            }
        }
    </script>
    <script src="script.js"></script>
</body>
</body>
</html>
