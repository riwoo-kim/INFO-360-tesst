<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendation</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; background-color: #f0f0f0; }
        .iphone-container { width: 375px; height: 812px; background-color: white; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); position: relative; overflow-y: auto; padding: 50px 20px 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn, .menu-btn { cursor: pointer; font-size: 20px; }
        
        /* Black badge for Level */
        .level-badge { background: black; color: white; border-radius: 15px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .level-tag { background: white; color: black; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }

        /* Checklist container */
        .grey-box { background: #e5e5e5; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 14px; }

        /* Recipe Cards */
        .recipe-card { background: #999; border-radius: 20px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; color: #333; }
        .recipe-card img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; }
        .recipe-info h3 { margin: 0; font-size: 16px; }
        .recipe-info p { margin: 5px 0 0; font-size: 12px; }
    </style>
</head>
<body>
    <div class="iphone-container">
        <header class="header">
            <span class="back-btn">&lt;</span>
            <h1 style="font-size: 20px; margin:0;">Recommendation</h1>
            <span class="menu-btn" onclick="location.href='history.html'">☰</span>
        </header>

        <div class="level-badge">
            <span>For</span>
            <span class="level-tag">Beginner</span>
        </div>

        <p style="font-weight: bold; font-size: 14px;">Ingredients I have</p>
        <div class="grey-box">
            <label class="check-item"><input type="checkbox" checked> Carrot</label>
            <label class="check-item"><input type="checkbox" checked> Onion</label>
            <label class="check-item"><input type="checkbox" checked> Tomato</label>
            <label class="check-item"><input type="checkbox" checked> Pasta</label>
        </div>

        <div class="recipe-card">
            <img src="https://via.placeholder.com/70" alt="Tomato soup">
            <div class="recipe-info">
                <h3>Tomato soup</h3>
                <p>Simple quick and easy!</p>
            </div>
        </div>
        <div class="recipe-card">
            <img src="https://via.placeholder.com/70" alt="Hamburger">
            <div class="recipe-info">
                <h3>Hamburger</h3>
                <p>Perfect meal for you!</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
