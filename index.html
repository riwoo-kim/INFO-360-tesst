<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Recommendation UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-white: #ffffff;
            --container-gray: #f0f0f0; /* The light gray background in your image */
            --card-gray: #a6a6a6;      /* The darker gray for recipe cards */
            --text-main: #000000;
        }

        body {
            font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Mobile Frame Styling */
        .phone-frame {
            width: 375px;
            height: 812px;
            background: var(--bg-white);
            border: 10px solid #1a1a1a;
            border-radius: 45px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        /* Status Bar Simulation */
        .status-bar {
            padding: 15px 30px 0;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 14px;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 30px;
            background: #000;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        /* Header Layout */
        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 26px;
            margin: 0;
            flex-grow: 1;
            text-align: center;
            margin-right: 20px; /* Offset to center text relative to back button */
        }

        /* "For Beginner" Section */
        .badge-container {
            background: #000;
            margin: 0 20px 20px;
            padding: 12px 20px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            color: white;
            font-size: 18px;
        }

        .badge {
            background: white;
            color: black;
            padding: 4px 14px;
            border-radius: 10px;
            margin-left: 10px;
            font-weight: 500;
        }

        /* Ingredients List Area */
        .section-label {
            padding-left: 30px;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .ingredients-list {
            background: var(--container-gray);
            margin: 0 20px;
            padding: 20px;
            border-radius: 25px;
        }

        .item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .item input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: #333;
        }

        /* Recipe Recommendations Area */
        .recommendations-container {
            background: var(--container-gray);
            margin: 20px;
            padding: 20px;
            border-radius: 25px;
            min-height: 250px;
        }

        .recipe-card {
            background: var(--card-gray);
            border-radius: 20px;
            display: flex;
            padding: 12px;
            margin-bottom: 15px;
            transition: opacity 0.3s ease, transform 0.2s;
        }

        .recipe-card.hidden {
            display: none;
        }

        .recipe-img {
            width: 85px;
            height: 85px;
            border-radius: 5px; /* Slight roundness as seen in image */
            background-size: cover;
            background-position: center;
        }

        .recipe-text {
            margin-left: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .recipe-text h3 { margin: 0; font-size: 17px; }
        .recipe-text p { margin: 4px 0 0; font-size: 13px; color: #333; }

    </style>
</head>
<body>

<div class="phone-frame">
    <div class="notch"></div>
    <div class="status-bar">
        <span>9:41</span>
        <div>
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>
        </div>
    </div>
    
    <div class="header">
        <i class="fa-solid fa-chevron-left"></i>
        <h1>Recommendation</h1>
        <i class="fa-solid fa-bars"></i>
    </div>

    <div class="badge-container">
        For <span class="badge">Beginner</span>
    </div>

    <div class="section-label">Ingredients I have</div>
    
    <div class="ingredients-list">
        <label class="item"><input type="checkbox" data-ing="carrot" checked> Carrot</label>
        <label class="item"><input type="checkbox" data-ing="onion" checked> Onion</label>
        <label class="item"><input type="checkbox" data-ing="tomato" checked> Tomato</label>
        <label class="item"><input type="checkbox" data-ing="pasta" checked> Pasta</label>
        <label class="item"><input type="checkbox" data-ing="water" checked> Water</label>
        <label class="item"><input type="checkbox" data-ing="salt" checked> Salt</label>
        <label class="item"><input type="checkbox" data-ing="soy" checked> Soy sauce</label>
    </div>

    <div class="recommendations-container" id="recipeList">
        <div class="recipe-card" data-req="tomato,water,salt">
            <div class="recipe-img" style="background-image: url('https://images.unsplash.com/photo-1547592110-823eb636c90f?w=200')"></div>
            <div class="recipe-text">
                <h3>Tomato soup</h3>
                <p>Simple quick and easy!</p>
            </div>
        </div>

        <div class="recipe-card" data-req="onion">
            <div class="recipe-img" style="background-image: url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200')"></div>
            <div class="recipe-text">
                <h3>Hamburger</h3>
                <p>Perfect meal for you!</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Get all checkboxes and recipe cards
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const recipes = document.querySelectorAll('.recipe-card');

    function updateRecipes() {

            .map(i => i.getAttribute('data-ing'));

            const required = recipe.getAttribute('data-req').split(',');
