<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Login Page</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Phone Container */
        .mobile-container {
            width: 375px;
            height: 812px;
            background-color: #f9f9f9;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Top Status Bar */
        .status-bar {
            height: 24px;
            padding: 20px 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }

        /* Main Content */
        .page-content {
            flex-grow: 1;
            background-image: url('https://via.placeholder.com/375x788/bbeeff'); 
            background-size: cover;
            background-position: center;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .welcome-title {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: bold;
        }

        /* Login Form Box */
        .login-box {
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 300px;
        }

        .input-field {
            margin-bottom: 15px;
        }

        .input-field label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }

        .input-field input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* Sign In Button */
        .signin-button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #333;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .signin-button:hover {
            background-color: #555;
        }

        .links {
            margin-top: 15px;
            font-size: 12px;
            color: #007bff;
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="status-bar">
            <span>9:41</span>
            <span>... | | |</span>
        </div>

        <main class="page-content">
            <h1 class="welcome-title">Welcome!</h1>
            
            <div class="login-box">
                <div class="input-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Value">
                </div>
                
                <div class="input-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Value">
                </div>

                <button class="signin-button" onclick="handleSignIn()">Sign In</button>

                <a href="#" class="links">Forgot password?</a>
                <a href="#" class="links">Sign up if you don't have an account.</a>
            </div>
        </main>
    </div>

    <script>
        // This function controls the navigation
        function handleSignIn() {
            // 1. Get the name from the input field
            const emailInput = document.getElementById('email');
            if (emailInput && emailInput.value) {
                // Store it so we can say "Hi [Name]" later
                localStorage.setItem('userName', emailInput.value);
            }

            // 2. Check if setup is already done
            const isSetupDone = localStorage.getItem('setupDone');

            // 3. Move to the next page
            if (isSetupDone === 'true') {
                // If returning user, go to main
                window.location.href = 'main.html';
            } else {
                // If new user, go to setup
                window.location.href = 'setup.html';
            }
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
