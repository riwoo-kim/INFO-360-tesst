<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interative Login Page</title>
    <style>
        /* General styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5; /* Light grey background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container to simulate a mobile device */
        .mobile-container {
            width: 375px; /* Common phone width */
            height: 812px; /* Common phone height */
            background-color: #f9f9f9; /* Phone body color */
            border-radius: 40px; /* Rounded corners for phone */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); /* Soft shadow */
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Top status bar simulation */
        .status-bar {
            height: 24px;
            padding: 0 20px;
            background-color: transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }

        /* Main background image inside phone */
        .page-content {
            flex-grow: 1;
            /* Placeholder background URL. Replace with your desired image. */
            background-image: url('https://via.placeholder.com/375x788/bbeeff'); 
            background-size: cover;
            background-position: center;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Title text */
        .welcome-title {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: bold;
        }

        /* Login form box */
        .login-box {
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 300px; /* Limit box width inside phone */
        }

        /* Input field styles */
        .input-field {
            margin-bottom: 15px;
        }

        .input-field label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }

        .input-field input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; /* To include padding in width */
            font-size: 14px;
            color: #333;
        }

        .input-field input::placeholder {
            color: #aaa;
        }

        /* Sign In button styles */
        .signin-button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #333; /* Dark grey */
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s; /* Add smooth effect on hover */
        }

        .signin-button:hover {
            background-color: #555;
        }
