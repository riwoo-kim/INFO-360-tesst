<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interative Login Page</title>
    <style>
        /* General styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5; /* Light grey background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container to simulate a mobile device */
        .mobile-container {
            width: 375px; /* Common phone width */
            height: 812px; /* Common phone height */
            background-color: #f9f9f9; /* Phone body color */
            border-radius: 40px; /* Rounded corners for phone */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); /* Soft shadow */
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Top status bar simulation */
        .status-bar {
            height: 24px;
            padding: 0 20px;
            background-color: transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }

        /* Main background image inside phone */
        .page-content {
            flex-grow: 1;
            /* Placeholder background URL. Replace with your desired image. */
            background-image: url('https://via.placeholder.com/375x788/bbeeff'); 
            background-size: cover;
            background-position: center;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Title text */
        .welcome-title {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: bold;
        }

        /* Login form box */
        .login-box {
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 300px; /* Limit box width inside phone */
        }

        /* Input field styles */
        .input-field {
            margin-bottom: 15px;
        }

        .input-field label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }

        .input-field input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; /* To include padding in width */
            font-size: 14px;
            color: #333;
        }

        .input-field input::placeholder {
            color: #aaa;
        }

        /* Sign In button styles */
        .signin-button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #333; /* Dark grey */
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s; /* Add smooth effect on hover */
        }

        .signin-button:hover {
            background-color: #555;
        }

        /* Link styles */
        .links {
            margin-top: 15px;
            font-size: 12px;
            color: #007bff; /* Blue for links */
            text-decoration: none;
            display: block; /* So links wrap onto new lines */
        }

        .links:hover {
            text-decoration: underline;
        }

        /* Next Page styles */
        #next-page {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: lightgreen; /* Simple color for next page */
            font-size: 24px;
            font-weight: bold;
            color: #333;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0; /* Hidden initially but animated to fade in */
            transition: opacity 0.5s ease-in-out;
            pointer-events: none; /* Can't click through when hidden */
        }

        #next-page.active {
            opacity: 1; /* Make visible when active */
            pointer-events: auto; /* Enable interaction when visible */
        }

        /* Responsive adjustment for small screens */
        @media (max-width: 400px) {
            .mobile-container {
                width: 90%;
                height: 90vh; /* Relative to viewport height */
                border-radius: 20px;
            }
            .page-content {
                padding: 20px 10px;
            }
            .welcome-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <div class="status-bar">
            <span>9:41</span>
            <span>... <span style="font-size: 12px; margin-left: 5px;">| | |</span></span>
        </div>

        <main class="page-content" id="login-page">
            <h1 class="welcome-title">Welcome!</h1>
            
            <div class="login-box">
                <div class="input-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Value">
                </div>
                
                <div class="input-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Value">
                </div>

                <button class="signin-button" id="signin-btn">Sign In</button>

                <a href="#" class="links">Forgot password?</a>
                <a href="#" class="links">Sign up if you don't have an account.</a>
            </div>
        </main>

        <div id="next-page">
            Success! Welcome Home.
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Get references to elements
            var signInBtn = document.getElementById('signin-btn');
            var loginPage = document.getElementById('login-page');
            var nextPage = document.getElementById('next-page');

            // Add click event listener to the Sign In button
            signInBtn.addEventListener('click', function () {
                // To simulate a successful login, hide the login page
                // and show the next page using CSS classes.
                loginPage.style.display = 'none'; // Hide login form
                nextPage.classList.add('active'); // Show next page (fade in animation)
            });
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
