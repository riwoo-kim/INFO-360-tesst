<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Recipe Filter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8f8f8;
            --list-bg: #eeeeee;
            --accent-black: #000000;
            --recipe-card: #a3a3a3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Mobile Container */
        .phone-frame {
            width: 375px;
            height: 812px;
            background: white;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* Header Styling */
        .header {
            padding: 50px 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 24px; margin: 0; font-weight: 600; }

        .level-bar {
            background: var(--accent-black);
            margin: 15px 20px;
            padding: 12px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            color: white;
        }
        .level-tag {
            background: white;
            color: black;
            padding: 4px 12px;
            border-radius: 8px;
            margin-left: 10px;
            font-weight: bold;
            font-size: 13px;
        }

        /* Ingredients List Section */
        .section-label { padding: 0 25px; font-size: 15px; color: #444; margin-bottom: 8px; }
        
        .ingredients-box {
            background: var(--list-bg);
            margin: 0 20px;
            padding: 15px;
            border-radius: 20px;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            padding: 6px 0;
            cursor: pointer;
            font-size: 15px;
        }

        .ingredient-item input {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
        }

        /* Recommendation Section */
        .recommendation-container {
            background: var(--list-bg);
            margin: 20px;
            padding: 15px;
            border-radius: 20px;
            flex-grow: 1;
            transition: all 0.3s ease;
        }

        .recipe-card {
            background: var(--recipe-card);
            border-radius: 15px;
            display: flex;
            padding: 12px;
            margin-bottom: 12px;
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
        }

        /* Class to hide recipes that don't match ingredients */
        .recipe-card.hidden {
            opacity: 0;
            transform: translateY(10px);
            visibility: hidden;
            position: absolute; /* Remove from flow so others slide up */
        }

        .recipe-img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            background-size: cover;
        }

        .recipe-info { margin-left: 15px; }
        .recipe-info h3 { margin: 0; font-size: 16px; }
        .recipe-info p { margin: 4px 0 0; font-size: 12px; color: #444; }

        .empty-state {
            text-align: center;
            color: #888;
            padding-top: 40px;
            display: none;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="header">
        <i class="fa-solid fa-chevron-left"></i>
        <h1>Recommendation</h1>
        <i class="fa-solid fa-bars"></i>
    </div>

    <div class="level-bar">
        <span>For</span>
        <div class="level-tag">Beginner</div>
    </div>

    <div class="section-label">Ingredients I have</div>
    
    <div class="ingredients-box">
        <label class="ingredient-item"><input type="checkbox" id="carrot" checked> Carrot</label>
        <label class="ingredient-item"><input type="checkbox" id="tomato" checked> Tomato</label>
        <label class="ingredient-item"><input type="checkbox" id="pasta" checked> Pasta</label>
        <label class="ingredient-item"><input type="checkbox" id="onion" checked> Onion</label>
    </div>

    <div class="recommendation-container" id="recipeContainer">
        
        <div class="recipe-card" data-requires="tomato,onion">
            <div class="recipe-img" style="background-image: url('https://images.unsplash.com/photo-1547592110-823eb636c90f?w=200')"></div>
            <div class="recipe-info">
                <h3>Tomato soup</h3>
                <p>Simple quick and easy!</p>
            </div>
        </div>

        <div class="recipe-card" data-requires="pasta,tomato">
            <div class="recipe-img" style="background-image: url('https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=200')"></div>
            <div class="recipe-info">
                <h3>Tomato Pasta</h3>
                <p>Perfect meal for you!</p>
            </div>
        </div>

        <div id="noMatch" class="empty-state">No recipes match your ingredients</div>
    </div>
</div>

<script>
    // Select all ingredient checkboxes and recipe cards
    const checkboxes = document.querySelectorAll('.ingredient-item input');
    const recipes = document.querySelectorAll('.recipe-card');
    const emptyState = document.getElementById('noMatch');

    function updateRecipes() {
        // Get an array of IDs for all checked ingredients
        const availableIngredients = Array.from(checkboxes)
            .filter(i => i.checked)
            .map(i => i.id);

        let visibleCount = 0;

        recipes.forEach(recipe => {
            // Get required ingredients for this specific recipe
            const requirements = recipe.getAttribute('data-requires').split(',');
            
            // Check if every requirement is present in the available list
            const hasAllIngredients = requirements.every(req => availableIngredients.includes(req));

            if (hasAllIngredients) {
                recipe.classList.remove('hidden');
                visibleCount++;
            } else {
                recipe.classList.add('hidden');
            }
        });

        // Show "empty" message if no recipes are visible
        emptyState.style.display = visibleCount === 0 ? 'block' : 'none';
    }

    // Add event listener to each checkbox to trigger the update
    checkboxes.forEach(box => {
        box.addEventListener('change', updateRecipes);
    });

    // Run once on load to set initial state
    updateRecipes();
</script>

</body>
</html>
