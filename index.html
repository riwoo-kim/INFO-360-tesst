<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Recommendation App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8f8f8;
            --card-bg: #e9e9e9;
            --list-bg: #eeeeee;
            --accent-black: #000000;
            --recipe-card: #a3a3a3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Phone Container Mockup */
        .phone-frame {
            width: 375px;
            height: 812px;
            background: white;
            border: 12px solid #1a1a1a;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Header Area */
        .header {
            padding: 50px 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header i { font-size: 20px; cursor: pointer; }
        .header h1 { font-size: 24px; margin: 0; font-weight: 500; }

        /* Level Selector */
        .level-bar {
            background: var(--accent-black);
            margin: 15px;
            padding: 12px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            color: white;
        }

        .level-tag {
            background: white;
            color: black;
            padding: 5px 15px;
            border-radius: 8px;
            margin-left: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Ingredients Section */
        .section-title {
            padding: 0 20px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .ingredients-container {
            background: var(--list-bg);
            margin: 0 20px;
            padding: 15px;
            border-radius: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .ingredient-item input {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            accent-color: #444;
        }

        .ingredient-item.unchecked { opacity: 0.5; text-decoration: line-through; }

        /* Recommendation Section */
        .recommendations {
            background: var(--list-bg);
            margin: 20px;
            padding: 15px;
            border-radius: 20px;
            flex-grow: 1;
        }

        .recipe-card {
            background: var(--recipe-card);
            border-radius: 15px;
            display: flex;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .recipe-card:active { transform: scale(0.98); }

        .recipe-img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
        }

        .recipe-info {
            margin-left: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .recipe-info h3 { margin: 0; font-size: 16px; }
        .recipe-info p { margin: 5px 0 0; font-size: 12px; opacity: 0.8; }

        /* Dynamic Notch */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background: black;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="notch"></div>
    
    <div class="header">
        <i class="fa-solid fa-chevron-left"></i>
        <h1>Recommendation</h1>
        <i class="fa-solid fa-bars"></i>
    </div>

    <div class="level-bar">
        <span>For</span>
        <div class="level-tag">Beginner</div>
    </div>

    <h2 class="section-title">Ingredients I have</h2>
    
    <div class="ingredients-container" id="ingredientList">
        <label class="ingredient-item"><input type="checkbox" checked> Carrot</label>
        <label class="ingredient-item"><input type="checkbox" checked> Onion</label>
        <label class="ingredient-item"><input type="checkbox" checked> Tomato</label>
        <label class="ingredient-item"><input type="checkbox" checked> Pasta</label>
        <label class="ingredient-item"><input type="checkbox" checked> Water</label>
        <label class="ingredient-item"><input type="checkbox" checked> Salt</label>
        <label class="ingredient-item"><input type="checkbox" checked> Soy sauce</label>
    </div>

    <div class="recommendations">
        <div class="recipe-card" onclick="alert('Opening Tomato Soup Recipe!')">
            <div class="recipe-img" style="background-image: url('https://images.unsplash.com/photo-1547592110-823eb636c90f?auto=format&fit=crop&w=200&q=80')"></div>
            <div class="recipe-info">
                <h3>Tomato soup</h3>
                <p>Simple quick and easy!</p>
            </div>
        </div>

        <div class="recipe-card" onclick="alert('Opening Hamburger Recipe!')">
            <div class="recipe-img" style="background-image: url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=200&q=80')"></div>
            <div class="recipe-info">
                <h3>Hamburger</h3>
                <p>Perfect meal for you!</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Add interactivity to checkboxes
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(box => {
        box.addEventListener('change', function() {
            if(this.checked) {
                this.parentElement.classList.remove('unchecked');
            } else {
                this.parentElement.classList.add('unchecked');
            }
        });
    });
</script>

</body>
</html>
