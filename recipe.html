<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomato Soup Recipe</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; background-color: #f0f0f0; }
        .iphone-container { width: 375px; height: 812px; background-color: white; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); position: relative; overflow-y: auto; padding: 50px 20px 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .section-title { font-weight: bold; margin: 15px 0 5px; font-size: 14px; color: #555; }
        .grey-box { background: #eee; border-radius: 20px; padding: 15px; margin-bottom: 15px; font-size: 14px; }
        .check-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        
        .recipe-step { margin-bottom: 10px; line-height: 1.4; }
        .footer-note { background: #ddd; border-radius: 15px; padding: 15px; font-size: 12px; margin-top: 20px; position: relative; }
        .read-more { position: absolute; bottom: 10px; right: 15px; font-size: 11px; color: #666; }
    </style>
</head>
<body>
    <div class="iphone-container">
        <header class="header">
            <span class="back-btn">&lt;</span>
            <h1 style="font-size: 20px; margin:0;">Tomato Soup</h1>
            <span class="menu-btn">☰</span>
        </header>

        <div class="section-title">Ingredients</div>
        <div class="grey-box">
            <div class="check-item"><input type="checkbox" checked> Carrot</div>
            <div class="check-item"><input type="checkbox" checked> Onion</div>
            <div class="check-item"><input type="checkbox" checked> Tomato</div>
            <div class="check-item"><input type="checkbox" checked> Water</div>
        </div>

        <div class="section-title">Recipie</div>
        <div class="grey-box">
            <div class="recipe-step">1. Sauté Carrot and onion for 5 minutes</div>
            <div class="recipe-step">2. Add tomato and basil</div>
            <div class="recipe-step">3. Cover with water</div>
            <div class="recipe-step">4. Simmer on low heat for 1 hour</div>
            <div class="recipe-step">5. Salt to taste</div>
        </div>

        <div class="section-title">History</div>
        <div class="footer-note">
            Tomato is really good for ur health ~~~~ blahblahblahjhhh
            <div class="read-more">Read More...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
